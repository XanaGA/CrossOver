name: "CrossOver"
rng_seed        : 42
num_gpu         : 1
base_dir        : "/home/xavi/CrossOver/tmp"
exp_dir         : ""
mode            : "train"
naming_keywords : ['task', 'time']

resume : False

logger :
  name : "wandb"
  entity : "multimodal-spaces"

  
data :
  sources     : ['Scannet']
  process_dir : ${base_dir}/preprocess_feats
  
  Scannet:
    base_dir         : /home/xavi/CrossOver/tmp/preprocess_feats/Scannet/scans
    shape_dir        : null
    process_dir      : ${data.process_dir}/Scannet
    chunked_dir      : ${data.process_dir}/objects_chunked/Scannet
    processor1D      : Scannet1DProcessor
    processor2D      : Scannet2DProcessor
    processor3D      : Scannet3DProcessor
    mesh_subfix      : _vh_clean_2.labels.ply
    seg_subfix       : _vh_clean_2.0.010000.segs.json
    aggre_subfix     : _vh_clean.aggregation.json
    avail_modalities : ['point', 'cad', 'rgb', 'referral']
    max_object_len   : 150
    voxel_size       : 0.02
  
  Scan3R:
    base_dir       : /media/sayan/internal/datasets/Scan3R/
    process_dir    : ${data.process_dir}/Scan3R/
    processor3D    : Scan3R3DProcessor
    processor2D    : Scan3R2DProcessor
    processor1D    : Scan3R1DProcessor
    label_filename : labels.instances.align.annotated.v2.ply
    avail_modalities : ['point', 'cad', 'rgb', 'referral']
    max_object_len : 150
    voxel_size     : 0.02

  ARKitScenes:
    base_dir       : /media/sayan/internal/datasets/ARKitScenes
    process_dir    : ${data.process_dir}/ARKitScenes/
    processor3D    : ARKitScenes3DProcessor
    processor2D    : ARKitScenes2DProcessor
    processor1D    : ARKitScenes1DProcessor
    max_object_len : 150
    voxel_size     : 0.02
    avail_modalities : ['point', 'cad', 'rgb', 'referral']
  MultiScan:
    base_dir       : /media/sayan/internal/datasets/MultiScan
    process_dir    : ${data.process_dir}/MultiScan
    processor3D    : MultiScan3DProcessor
    processor2D    : MultiScan2DProcessor
    processor1D    : MultiScan1DProcessor
    avail_modalities : ['point', 'cad', 'rgb', 'referral']
    max_object_len : 150
    voxel_size     : 0.02

task: 
  name       : InferenceSceneRetrieval
  InferenceSceneRetrieval:
    val                     : [Scannet]
    modalities              : ['rgb', 'point', 'cad', 'referral']
    scene_modalities        : ['point', 'floorplan'] # ['rgb', 'point', 'referral', 'floorplan'] 
    # ckpt_path               : /home/xavi/CrossOver/checkpoints/model.safetensors
    ckpt_path               : /home/xavi/CrossOver/checkpoints/mmfe_global_desc/best.ckpt
    mmfe:
      image_size            : [256, 256]
      floorplan_img_name    : mmfe_floorplan.png    # or floor+obj.png
      point_source          : density               # 'density' for pre-rendered images, 'coordinates' for on-the-fly rendering
      density_name          : density.png            # density.png | density_large.png | density_mesh.png | density_mesh_noisy.png

inference_module: SceneRetrieval
model: 
  name: UnifiedEncoder
  point:
    embed_dim : 384
  cad:
    embed_dim : 384
  image:
    embed_dim : 1536
  referral:
    embed_dim : 768

  # Only For Unified Encoder
  encoder1D:
    input_dim : 768
  encoder2D :
    input_dim : 1536
  encoder3D:
    input_dim : 512
  out_dim     : 768

dataloader:
  batch_size  : 4
  num_workers : 2