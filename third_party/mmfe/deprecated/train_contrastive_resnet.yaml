defaults:
  - _self_

# Data configuration
data:
  image_size: [256, 256]
  cubicasa:
    path: data/cubicasa5k/
    train: data/cubicasa5k/train.txt
    val: data/cubicasa5k/val.txt
  structured3d:
    path: data/structure3D/Structured3D_bbox/Structured3D/
    train: data/structure3D/train.json
    val: data/structure3D/val.json

# Training loop configuration
train:
  batch_size: 32
  epochs: 100
  num_workers: 4
  gpus: 1
  precision: 16
  accumulate_grad_batches: 1
  seed: 42
  deterministic: false
  rotation: 180

# Model configuration
model:
  backbone: resnet50
  projection_dim: 32
  projection_spatial: [32, 32]
  projection_head: cnn
  freeze_backbone: false
  backbone_kwargs: 

# Loss configuration
loss:
  type: infonce2d
  temperature: 0.07
  margin: 1.0
  block_size: 1024

# Optimizer configuration
optim:
  lr: 1.0e-4
  weight_decay: 1.0e-4

# Scheduler configuration
scheduler:
  use: false

# Logging & checkpointing
logging:
  output_dir: outputs/contrastive
  project_name: contrastive_learning
  experiment_name: local_proj_dim=${model.projection_dim}_${model.backbone}_${model.projection_head}_rot=${train.rotation}
  save_top_k: 3
  wandb: true

# Hydra runtime configuration
hydra:
  run:
    dir: ${logging.output_dir}/${now:%Y-%m-%d_%H-%M-%S}
  job:
    chdir: true


