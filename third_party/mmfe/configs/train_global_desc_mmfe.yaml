# Configuration for training global descriptor models
# Usage: python scripts/training_scripts/train_global_desc.py

# Backbone configuration
backbone:
  # name: "dinov3_vitb16"  # backbone architecture (vgg16, dinov3_vitb16, etc.)
  name: "mmfe"  # backbone architecture (vgg16, dinov3_vitb16, etc.)
  pretrained: true  # use pretrained weights
  freeze: "all"  # freeze backbone parameters
  kwargs:
    checkpoint_path: "/local/home/xanadon/mmfe/outputs/contrastive/checkpoints/remote/49075485_proj_dim_32_dino_MoGe1_common_180_[0.0,0.0]_[1.0,1.0]_noise_25_[0.2,0.2]_[0.5,1.5]_train_eq_true/49075485_proj_dim_32_dino_MoGe1_common_180_[0.0,0.0]_[1.0,1.0]_noise_25_[0.2,0.2]_[0.5,1.5]_train_eq_true-val_loss=0.0021-epoch=08.ckpt"

# Global descriptor configuration
descriptor:
  type: "netvlad"  # type of global descriptor (netvlad, gem, avg, max)
  output_dim: 512  # final output dimension of global descriptor
  kwargs:
    num_clusters: 64  # number of clusters for NetVLAD
    vladv2: false  # use NetVLAD v2
    cluster_path: "outputs/global_descriptors/clusters/netvlad_clusters_mmfe_64.pth"  
    precomputed_clusters: true

# Loss configuration
loss:
  type: infonce1d # infonce1d | MultiSimilarityLoss
  kwargs:
    miner_name: MultiSimilarityMiner
    temperature: 0.07  # temperature for InfoNCE loss
    epsilon: 0.1
    max_negatives: 16

# Training configuration
train:
  batch_size: 16
  epochs: 50
  num_workers: 4
  seed: 42
  deterministic: false
  precision: 16  # mixed precision training
  accumulate_grad_batches: 1
  early_stopping_patience: 20  # 0 to disable
  gpus: 1

# Optimizer configuration
optim:
  lr: 1e-4
  weight_decay: 1e-4

# Scheduler configuration
scheduler:
  use: true
  eta_min: 1e-6

# Data configuration
data:
  image_size: [256, 256]  # (H, W)
  
  # CubiCasa5k dataset
  cubicasa:
    path: data/cubicasa5k/
    train: data/cubicasa5k/train.txt
    val: data/cubicasa5k/val.txt
  structured3d:
    # path: data/structure3D/Structured3D_bbox/Structured3D/
    # train: data/structure3D/train.json
    # val: data/structure3D/val.json
    path: null
    train: null
    val: null
  aria_synthenv:
    # path: data/aria/SyntheticEnv/rendered_data/
    # train: data/aria/SyntheticEnv/train.txt
    # val: data/aria/SyntheticEnv/val.txt
    path: null
    train: null
    val: null

  swiss_dwellings:
    path: data/SwissDwellings/modified-swiss-dwellings-v2/all_render/
    train: data/SwissDwellings/modified-swiss-dwellings-v2/train.txt
    val: data/SwissDwellings/modified-swiss-dwellings-v2/val.txt

  zillow:
    path: data/zind/rendered_data/
    train: data/zind/train.txt
    val: data/zind/val.txt

  # Transformation configuration
  affine_transform:
    common_degrees: 180  # rotation degrees
    common_translate: [0.2, 0.2]  # translation
    common_scale: [0.5, 1.5]  # scale

# Logging configuration
logging:
  output_dir: "outputs/global_descriptors"
  experiment_name: local_${backbone.name}_${descriptor.type}_common_${data.affine_transform.common_degrees}_${data.affine_transform.common_translate}_${data.affine_transform.common_scale}_preCluster_${descriptor.kwargs.precomputed_clusters}_freeze_${backbone.freeze}
  project_name: "global_descriptors"
  save_top_k: 3
  wandb: true  # enable W&B logging

