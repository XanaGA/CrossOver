# Configuration for rotation visualization video generation

# Data paths and settings
data:
  image_size: [256, 256]
  cubicasa:
    path: null # e.g., data/cubicasa5k
    val: null  # e.g., data/cubicasa5k/val.txt
  structured3d:
    path: null
    val: null
  aria_synthenv:
    path: null
    val: null
  swiss_dwellings:
    path: null
    val: null
  zillow:
    path: null
    val: null

# Dataset Loading
val:
  num_workers: 8
  batch_size: 1 # Not strictly used for video, but kept for create_val_dataset compatibility

# Model
model:
  checkpoint: "outputs/contrastive/checkpoints/remote/49075485_proj_dim_32_dino_MoGe1_common_180_[0.0,0.0]_[1.0,1.0]_noise_25_[0.2,0.2]_[0.5,1.5]_train_eq_true/49075485_proj_dim_32_dino_MoGe1_common_180_[0.0,0.0]_[1.0,1.0]_noise_25_[0.2,0.2]_[0.5,1.5]_train_eq_true-val_loss=0.0021-epoch=08.ckpt"

# Normalization constants
transforms:
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

# Video Generation Settings
video:
  output_dir: "outputs/rotation_videos"
  num_samples: 5      # Number of dataset samples to process
  num_rotations: 36   # Number of frames (360 / 36 = 10 degree steps)
  fps: 10