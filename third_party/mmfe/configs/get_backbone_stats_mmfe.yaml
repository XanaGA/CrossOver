# @package _global_

defaults:
  - _self_

# Model configuration
model:
  model_type: "romafinetuner"  # "roma_v1" or "romafinetuner"
  
  # For RoMaFineTuner
  matcher_name: "romav1"  # "romav1" or "romav2"
  backbone:
    backbone_name: "mmfe"  # "mmfe" or null for default DINOv2
    # backbone_name: dinov2_vitb14
    freeze_dino_only: false
    mmfe_checkpoint_path: "/home/xavi/mmfe/outputs/contrastive/checkpoints/remote/53405021/last.ckpt"
    replace_dino_only: true # false (CNN+DINOv2) is not supported yet
    use_downsampled_dino: true
  
  # Optional: checkpoint path for pretrained RoMaFineTuner (not required, can initialize without)
  checkpoint: null

# Data configuration
data:
  cubicasa:
    path: null
    val: null
  structured3d:
    # path: "data/structure3D/Structured3D_bbox/Structured3D/"
    # val: "data/structure3D/val.json"
    path: null
    val: null
  aria_synthenv:
    path: null
    val: null
  swiss_dwellings:
    path: null
    val: null
  zillow:
    path: null
    val: null
  scannet:
    path: null
    val: null
  image_size: [256, 256]

# Transformation configuration (for dataset creation)
transforms:
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  tf_difficulty: null  # null, "easy", "medium", "hard", "rot_only"
  rotate_after: false

# Runtime configuration
runtime:
  device: "cuda"  # "cuda" or "cpu"
  batch_size: 8
  num_workers: 8
  max_batches: null  # null for all batches, or specify number

# Output configuration
output:
  results_json: "outputs/metrics/backbone_stats.json"







