# Data configuration
data:
  cubicasa:
    # path: "data/cubicasa5k/"
    # val: "data/cubicasa5k/val.txt"
    path: null
    val: null
  structured3d:
    # path: "data/structure3D/Structured3D_bbox/Structured3D/"
    # val: "data/structure3D/val.json"
    path: null
    val: null
  aria_synthenv:
    # path: "data/aria/SyntheticEnv/rendered_data/"
    # val: "data/aria/SyntheticEnv/val.txt"
    path: null
    val: null
  swiss_dwellings:
    # path: "data/SwissDwellings/modified-swiss-dwellings-v2/all_render/"
    # val: "data/SwissDwellings/modified-swiss-dwellings-v2/val.txt"
    path: null
    val: null
  zillow:
    # path: "data/zind/rendered_data/"
    # val: "data/zind/val.txt"
    path: null
    val: null
  scannet:
    # path: "data/scannet/rendered/"
    # val: "data/scannet/scannetv2_val.txt"
    path: null
    val: null
    # modality_pairs: [["density_map_mesh", "floorplan"]]
  image_size: [256, 256]  # (H, W)

  # Transformation configuration
  affine_transform:
    # common_degrees: 0
    # common_translate: [0.0, 0.0]
    # common_scale: [1.0, 1.0]
    common_degrees: 180
    common_translate: [0.2, 0.2]
    common_scale: [0.5, 1.5]

# Evaluation configuration
eval:
  # Number of examples to evaluate
  num_examples: 4000  # Number of examples to evaluate (N)
  
  # Batch processing
  batch_size: 16  # Batch size for embedding computation
  num_workers: 8  # Number of workers for data loading
  
  # Random seed
  seed: 42  # Random seed for reproducibility

# Runtime configuration
runtime:
  device: "cuda"  # Device to use: 'cuda' or 'cpu'

# Logging configuration
logging:
  output_dir: "outputs/metrics/retrieval"  # Output directory for results

# Retrieval mode configuration
retrieval:
  # mode: "voting"  # 'voting' or '1d_vectors'
  mode: "1d_vectors"  # 'voting' or '1d_vectors'
  mode_kwargs:
    num_votes: 50  # Number of cells to sample for voting (M)
  topk_metrics: [1, 5, 10]
  num_visualizations: 50  # Number of query visualizations to save (0 to disable)
    

